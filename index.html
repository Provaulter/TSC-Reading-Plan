<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#FAF8F5" />
  <title>Daily Reading</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: #FAF8F5;
      color: #2C2521;
      -webkit-font-smoothing: antialiased;
    }
    /* Hide scrollbar but allow scroll */
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script src="config.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ============================================================
    // CONFIG
    // ============================================================
    const ESV_API_KEY = window.APP_CONFIG?.ESV_API_KEY || "";
    const PLAN_FILES = window.APP_CONFIG?.PLAN_FILES || ["plans/daily-2026.json"];

    // ============================================================
    // ESV API
    // ============================================================
    async function fetchPassageText(query) {
      if (!ESV_API_KEY) return { text: "ESV API key not configured. See config.js.", copyright: "" };
      try {
        const params = new URLSearchParams({
          q: query,
          "include-headings": true,
          "include-footnotes": false,
          "include-verse-numbers": true,
          "include-short-copyright": true,
          "include-passage-references": false,
        });
        const res = await fetch(`https://api.esv.org/v3/passage/text/?${params}`, {
          headers: { Authorization: `Token ${ESV_API_KEY}` },
        });
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        const data = await res.json();
        return {
          text: data.passages?.[0] || "Passage not found.",
          copyright: data.passages?.[0] ? "(ESV)" : "",
        };
      } catch (err) {
        console.error("ESV text fetch error:", err);
        return { text: "Unable to load passage. Check your connection and try again.", copyright: "" };
      }
    }

    function getAudioUrl(query) {
      return `https://audio.esv.org/hw/${encodeURIComponent(query)}.mp3`;
    }

    // ============================================================
    // LOCAL STORAGE HELPERS
    // ============================================================
    const STORAGE_KEY = "bible-reading-progress";

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch { return {}; }
    }

    function saveProgress(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) { console.error("Could not save progress:", e); }
    }

    // ============================================================
    // DATE HELPERS
    // ============================================================
    function getToday() {
      const d = new Date();
      return d.getFullYear() + "-" +
        String(d.getMonth() + 1).padStart(2, "0") + "-" +
        String(d.getDate()).padStart(2, "0");
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    }

    function formatDateLong(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
    }

    // ============================================================
    // ICONS
    // ============================================================
    const PlayIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    );
    const PauseIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    );
    const CheckIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    );
    const BookIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    );
    const CalendarIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    );
    const ShareIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    );
    const ChevronLeft = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    );
    const ListIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    );

    // ============================================================
    // PASSAGE CARD COMPONENT
    // ============================================================
    function PassageCard({ passage, checked, onToggle, selectedDate }) {
      const [expanded, setExpanded] = useState(false);
      const [text, setText] = useState(null);
      const [loading, setLoading] = useState(false);
      const [playing, setPlaying] = useState(false);
      const audioRef = useRef(null);

      const handleExpand = async () => {
        if (expanded) { setExpanded(false); return; }
        setExpanded(true);
        if (!text) {
          setLoading(true);
          const result = await fetchPassageText(passage);
          setText(result);
          setLoading(false);
        }
      };

      const handleAudio = () => {
        if (!audioRef.current) {
          audioRef.current = new Audio();
          audioRef.current.addEventListener("ended", () => setPlaying(false));
          audioRef.current.addEventListener("error", () => {
            setPlaying(false);
            alert("Unable to play audio. Check your connection.");
          });
        }
        if (playing) {
          audioRef.current.pause();
          setPlaying(false);
        } else {
          const url = getAudioUrl(passage);
          audioRef.current.src = url;
          audioRef.current.play()
            .then(() => setPlaying(true))
            .catch(() => {
              setPlaying(false);
              alert("Unable to play audio.");
            });
        }
      };

      // Cleanup audio on unmount
      useEffect(() => {
        return () => {
          if (audioRef.current) {
            audioRef.current.pause();
            audioRef.current = null;
          }
        };
      }, []);

      return (
        <div style={{
          background: "#FFFFFF", borderRadius: 12,
          border: "1px solid #EDE8E0", overflow: "hidden",
        }}>
          <div style={{
            display: "flex", alignItems: "center",
            padding: "14px 16px", gap: 12,
          }}>
            <div
              onClick={onToggle}
              style={{
                width: 24, height: 24, borderRadius: 12,
                border: checked ? "none" : "2px solid #D6CEBF",
                background: checked ? "#6B8F71" : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
                cursor: "pointer", flexShrink: 0, color: "#fff",
                transition: "all 0.2s ease",
              }}
            >
              {checked && <CheckIcon />}
            </div>
            <div
              onClick={handleExpand}
              style={{
                flex: 1, fontSize: 17, fontWeight: 500, cursor: "pointer",
                color: checked ? "#A0937E" : "#2C2521",
                textDecoration: checked ? "line-through" : "none",
              }}
            >
              {passage}
            </div>
            <button
              onClick={handleAudio}
              style={{
                width: 36, height: 36, borderRadius: 18, border: "none",
                background: playing ? "#2C2521" : "#F0EBE3",
                color: playing ? "#FAF8F5" : "#6B5D4D",
                display: "flex", alignItems: "center", justifyContent: "center",
                cursor: "pointer", flexShrink: 0,
              }}
              title={playing ? "Pause" : "Listen"}
            >
              {playing ? <PauseIcon /> : <PlayIcon />}
            </button>
          </div>
          {expanded && (
            <div style={{
              padding: "16px 16px 16px 52px", fontSize: 15,
              lineHeight: 1.75, color: "#4A4039", whiteSpace: "pre-line",
              borderTop: "1px solid #F0EBE3",
            }}>
              {loading ? (
                <div style={{ color: "#A0937E", fontStyle: "italic" }}>Loading passage...</div>
              ) : text ? (
                <>
                  {text.text}
                  {text.copyright && (
                    <div style={{ marginTop: 12, fontSize: 11, color: "#A0937E" }}>
                      {text.copyright}
                    </div>
                  )}
                </>
              ) : null}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [plans, setPlans] = useState({});
      const [activePlanId, setActivePlanId] = useState(null);
      const [view, setView] = useState("today");
      const [selectedDate, setSelectedDate] = useState(getToday);
      const [completed, setCompleted] = useState(loadProgress);
      const [copied, setCopied] = useState(false);
      const [loading, setLoading] = useState(true);

      // Load plans from JSON files
      useEffect(() => {
        async function loadPlans() {
          const loaded = {};
          for (const file of PLAN_FILES) {
            try {
              const res = await fetch(file);
              if (!res.ok) continue;
              const data = await res.json();
              const id = file.replace("plans/", "").replace(".json", "");
              loaded[id] = data;
            } catch (e) {
              console.error(`Failed to load plan: ${file}`, e);
            }
          }
          setPlans(loaded);
          const ids = Object.keys(loaded);
          if (ids.length > 0) setActivePlanId(ids[0]);
          setLoading(false);
        }
        loadPlans();
      }, []);

      // Save progress when it changes
      useEffect(() => { saveProgress(completed); }, [completed]);

      const plan = activePlanId ? plans[activePlanId] : null;
      const todayStr = getToday();
      const todayReading = plan?.readings?.find((r) => r.date === selectedDate);
      const dayNum = plan?.readings?.findIndex((r) => r.date === selectedDate);
      const dayLabel = dayNum >= 0 ? `Day ${dayNum + 1} of ${plan.readings.length}` : "No reading today";

      const toggleComplete = useCallback((date, passage) => {
        if (!activePlanId) return;
        const key = `${activePlanId}|${date}|${passage}`;
        setCompleted((prev) => {
          const next = { ...prev, [key]: !prev[key] };
          return next;
        });
      }, [activePlanId]);

      const isComplete = useCallback(
        (date, passage) => !!completed[`${activePlanId}|${date}|${passage}`],
        [completed, activePlanId]
      );

      const isDayComplete = useCallback(
        (date) => {
          if (!plan) return false;
          const reading = plan.readings.find((r) => r.date === date);
          if (!reading) return false;
          return reading.passages.every((p) => completed[`${activePlanId}|${date}|${p}`]);
        },
        [completed, activePlanId, plan]
      );

      const completedDays = useMemo(
        () => (plan ? plan.readings.filter((r) => isDayComplete(r.date)).length : 0),
        [plan, isDayComplete]
      );

      const handleShare = () => {
        const url = window.location.href;
        if (navigator.share) {
          navigator.share({ title: "Daily Bible Reading", url });
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(url);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }
      };

      // ============================================================
      // LOADING / EMPTY
      // ============================================================
      if (loading) {
        return (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "#A0937E", fontSize: 15 }}>
            Loading plans...
          </div>
        );
      }

      if (!plan) {
        return (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "#A0937E", fontSize: 15, padding: 40, textAlign: "center", lineHeight: 1.6 }}>
            No reading plans found. Add a plan JSON file to the <code>plans/</code> folder and list it in <code>config.js</code>.
          </div>
        );
      }

      // ============================================================
      // TODAY VIEW
      // ============================================================
      const renderToday = () => (
        <>
          <div style={{ padding: "28px 20px 20px" }}>
            <div style={{ fontSize: 14, color: "#A0937E", marginBottom: 4 }}>{plan.name}</div>
            <div style={{ fontSize: 28, fontWeight: 600, lineHeight: 1.2, marginBottom: 4 }}>
              {selectedDate === todayStr ? "Today" : formatDateLong(selectedDate)}
            </div>
            <div style={{ fontSize: 13, color: "#A0937E" }}>
              {selectedDate === todayStr && <span style={{ marginRight: 8 }}>{formatDate(selectedDate)}</span>}
              {dayLabel}
            </div>
          </div>
          <div style={{ margin: "0 20px", height: 3, background: "#E8E2D9", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", background: "#6B8F71", borderRadius: 2, width: `${(completedDays / plan.readings.length) * 100}%`, transition: "width 0.4s ease" }} />
          </div>
          <div style={{ padding: "6px 20px 0", fontSize: 12, color: "#A0937E" }}>
            {completedDays} of {plan.readings.length} days complete
          </div>
          {todayReading ? (
            <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 12 }}>
              {todayReading.passages.map((passage) => (
                <PassageCard
                  key={passage}
                  passage={passage}
                  checked={isComplete(selectedDate, passage)}
                  onToggle={() => toggleComplete(selectedDate, passage)}
                  selectedDate={selectedDate}
                />
              ))}
            </div>
          ) : (
            <div style={{ padding: "60px 20px", textAlign: "center", color: "#A0937E", fontSize: 15, lineHeight: 1.6 }}>
              No reading scheduled for this date.<br />Check the schedule for upcoming readings.
            </div>
          )}
        </>
      );

      // ============================================================
      // CALENDAR VIEW
      // ============================================================
      const renderCalendar = () => {
        // Find the index of today or the nearest future date
        const todayIdx = plan.readings.findIndex((r) => r.date >= todayStr);
        return (
          <>
            <div style={{ fontSize: 20, fontWeight: 600, padding: "20px 20px 4px" }}>Reading Schedule</div>
            <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 6 }}>
              {plan.readings.map((reading, i) => {
                const isToday = reading.date === todayStr;
                const done = isDayComplete(reading.date);
                const isPast = reading.date < todayStr;
                return (
                  <div
                    key={reading.date}
                    onClick={() => { setSelectedDate(reading.date); setView("today"); }}
                    style={{
                      display: "flex", alignItems: "center", padding: "11px 14px",
                      background: isToday ? "#FFFFFF" : "transparent",
                      border: isToday ? "1px solid #D6CEBF" : "1px solid transparent",
                      borderRadius: 10, cursor: "pointer", gap: 12,
                      opacity: isPast && !isToday ? 0.6 : 1,
                    }}
                  >
                    <div style={{
                      width: 10, height: 10, borderRadius: 5, flexShrink: 0,
                      background: done ? "#6B8F71" : isToday ? "#D4A96A" : "#E0D9CF",
                    }} />
                    <div style={{ fontSize: 13, color: "#8B7D6B", minWidth: 90 }}>
                      {formatDate(reading.date)}
                    </div>
                    <div style={{
                      fontSize: 14, fontWeight: 500, color: "#2C2521",
                      textDecoration: done ? "line-through" : "none",
                    }}>
                      {reading.passages.join(", ")}
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        );
      };

      // ============================================================
      // PLANS VIEW
      // ============================================================
      const renderPlans = () => (
        <>
          <div style={{ fontSize: 20, fontWeight: 600, padding: "20px 20px 4px" }}>Reading Plans</div>
          <div style={{ padding: "12px 20px" }}>
            {Object.entries(plans).map(([id, p]) => {
              const active = id === activePlanId;
              const planCompleted = p.readings.filter((r) =>
                r.passages.every((ps) => completed[`${id}|${r.date}|${ps}`])
              ).length;
              return (
                <div
                  key={id}
                  onClick={() => {
                    setActivePlanId(id);
                    setSelectedDate(todayStr);
                    setView("today");
                  }}
                  style={{
                    padding: 18, marginBottom: 10, borderRadius: 12, cursor: "pointer",
                    background: active ? "#FFFFFF" : "transparent",
                    border: active ? "2px solid #6B8F71" : "1px solid #E8E2D9",
                  }}
                >
                  <div style={{ fontSize: 17, fontWeight: 600, color: active ? "#2C2521" : "#6B5D4D", marginBottom: 4 }}>
                    {p.name}
                  </div>
                  <div style={{ fontSize: 13, color: "#A0937E", lineHeight: 1.5, marginBottom: 4 }}>
                    {p.description}
                  </div>
                  <div style={{ fontSize: 13, color: "#A0937E" }}>
                    {p.readings.length} days — {planCompleted} completed
                  </div>
                  {active && (
                    <div style={{
                      display: "inline-block", marginTop: 8, padding: "3px 10px",
                      background: "#6B8F71", color: "#fff", fontSize: 11,
                      borderRadius: 10, fontWeight: 600,
                    }}>Active</div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      );

      // ============================================================
      // RENDER
      // ============================================================
      return (
        <div style={{
          maxWidth: 480, margin: "0 auto", minHeight: "100vh",
          background: "#FAF8F5", display: "flex", flexDirection: "column",
        }}>
          {/* HEADER */}
          <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            {view !== "today" ? (
              <button
                onClick={() => { setView("today"); setSelectedDate(todayStr); }}
                style={{
                  display: "flex", alignItems: "center", gap: 4, border: "none",
                  background: "transparent", color: "#8B7D6B", fontSize: 14,
                  fontFamily: "'Source Serif 4', Georgia, serif", cursor: "pointer", padding: 0,
                }}
              >
                <ChevronLeft /> Today
              </button>
            ) : (
              <div style={{
                fontSize: 11, fontWeight: 600, letterSpacing: "0.12em",
                textTransform: "uppercase", color: "#8B7D6B",
              }}>
                Daily Reading
              </div>
            )}
            <button onClick={handleShare} style={{
              display: "flex", alignItems: "center", gap: 6, padding: "6px 12px",
              border: "1px solid #D6CEBF", borderRadius: 20, background: "transparent",
              color: "#8B7D6B", fontSize: 12, fontFamily: "'Source Serif 4', Georgia, serif",
              cursor: "pointer",
            }}>
              <ShareIcon />
              {copied ? "Copied!" : "Share"}
            </button>
          </div>

          {/* CONTENT */}
          <div style={{ flex: 1, overflowY: "auto", paddingBottom: 80 }}>
            {view === "today" && renderToday()}
            {view === "calendar" && renderCalendar()}
            {view === "plans" && renderPlans()}
          </div>

          {/* BOTTOM NAV */}
          <div style={{
            display: "flex", borderTop: "1px solid #E8E2D9", background: "#FAF8F5",
            position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 480, margin: "0 auto",
          }}>
            {[
              { id: "today", label: "Today", icon: <BookIcon /> },
              { id: "calendar", label: "Schedule", icon: <CalendarIcon /> },
              { id: "plans", label: "Plans", icon: <ListIcon /> },
            ].map((tab) => (
              <button
                key={tab.id}
                onClick={() => { setView(tab.id); if (tab.id === "today") setSelectedDate(todayStr); }}
                style={{
                  flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
                  gap: 4, padding: "12px 0", border: "none", background: "transparent",
                  color: view === tab.id ? "#6B8F71" : "#A0937E", fontSize: 11,
                  fontFamily: "'Source Serif 4', Georgia, serif", cursor: "pointer",
                  fontWeight: view === tab.id ? 600 : 400,
                }}
              >
                {tab.icon}
                {tab.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
